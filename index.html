<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STACC | Feedback</title>
    <meta name="description" content="Feedback form for the STACC Linux Installation Party." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Animated background dots behind everything if needed, or grid -->
    <div id="page-bg"></div>

    <section id="feedback-section" class="page active">
      <div class="container col-11 col-sm-10 col-md-8 col-lg-6 stacc-card-wrapper">
        
        <div class="logo-area mb-3">
          <div class="logo-main">
            <span class="logo-text">ST</span>
            <svg class="logo-arch" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
              <path d="M31.994-.006c-2.85 6.985-4.568 11.554-7.74 18.332 1.945 2.062 4.332 4.462 8.2 7.174-4.168-1.715-7-3.437-9.136-5.224-4.06 8.47-10.42 20.538-23.327 43.73C10.145 58.15 18 54.54 25.338 53.16c-.315-1.354-.494-2.818-.48-4.345l.012-.325c.16-6.5 3.542-11.498 7.547-11.158s7.118 5.886 6.957 12.386a18.36 18.36 0 0 1-.409 3.491c7.25 1.418 15.03 5.02 25.037 10.797l-5.42-10.026c-2.65-2.053-5.413-4.726-11.05-7.62 3.875 1.007 6.65 2.168 8.8 3.467-17.1-31.84-18.486-36.07-24.35-49.833z" fill="#1793d1" fill-rule="evenodd"/>
            </svg>
            <span class="logo-text">CC</span>
          </div>
          <p class="subtitle text-center mt-2">Linux Installation Party Feedback</p>
        </div>

        <h2 class="stacc-floating-title">feedback</h2>
        <div class="stacc-main-card">
          <form id="staccForm" >
            
            <!-- SECTION 1 -->
            <div class="section-title">Program Content</div>
            
            <div class="field-group">
              <label class="form-label">Was the objective of the program clear?</label>
              <div class="radio-row">
                <label class="radio-container">
                  <input type="radio" name="objective_clear" value="yes" required />
                  <span class="custom-radio"></span> Yes
                </label>
                <label class="radio-container">
                  <input type="radio" name="objective_clear" value="no" />
                  <span class="custom-radio"></span> No
                </label>
              </div>
            </div>

            <div class="field-group">
              <label class="form-label">How informative was the program?</label>
              <div class="radio-row flex-wrap">
                <label class="radio-container"><input type="radio" name="informative" value="excellent" required /><span class="custom-radio"></span> Excellent</label>
                <label class="radio-container"><input type="radio" name="informative" value="good" /><span class="custom-radio"></span> Good</label>
                <label class="radio-container"><input type="radio" name="informative" value="average" /><span class="custom-radio"></span> Average</label>
                <label class="radio-container"><input type="radio" name="informative" value="poor" /><span class="custom-radio"></span> Poor</label>
              </div>
            </div>

            <div class="field-group">
              <label class="form-label">Did the program meet your expectations?</label>
              <div class="radio-row">
                <label class="radio-container"><input type="radio" name="expectations" value="yes" required /><span class="custom-radio"></span> Yes</label>
                <label class="radio-container"><input type="radio" name="expectations" value="partially" /><span class="custom-radio"></span> Partially</label>
                <label class="radio-container"><input type="radio" name="expectations" value="no" /><span class="custom-radio"></span> No</label>
              </div>
            </div>

            <!-- SECTION 2 -->
            <div class="section-title">Organization</div>

            <div class="field-group">
              <label class="form-label">How well was the program organized?</label>
              <div class="radio-row flex-wrap">
                <label class="radio-container"><input type="radio" name="organized" value="excellent" required /><span class="custom-radio"></span> Excellent</label>
                <label class="radio-container"><input type="radio" name="organized" value="good" /><span class="custom-radio"></span> Good</label>
                <label class="radio-container"><input type="radio" name="organized" value="average" /><span class="custom-radio"></span> Average</label>
                <label class="radio-container"><input type="radio" name="organized" value="poor" /><span class="custom-radio"></span> Poor</label>
              </div>
            </div>

            <div class="field-group">
              <label class="form-label">Was the time management proper?</label>
              <div class="radio-row">
                <label class="radio-container"><input type="radio" name="time_mgmt" value="yes" required /><span class="custom-radio"></span> Yes</label>
                <label class="radio-container"><input type="radio" name="time_mgmt" value="no" /><span class="custom-radio"></span> No</label>
              </div>
            </div>

            <!-- SECTION 3 -->
            <div class="section-title">Speaker / Presenter</div>

            <div class="field-group">
              <label class="form-label">How was the quality of the speaker/presenter?</label>
              <div class="radio-row flex-wrap">
                <label class="radio-container"><input type="radio" name="speaker" value="excellent" required /><span class="custom-radio"></span> Excellent</label>
                <label class="radio-container"><input type="radio" name="speaker" value="good" /><span class="custom-radio"></span> Good</label>
                <label class="radio-container"><input type="radio" name="speaker" value="average" /><span class="custom-radio"></span> Average</label>
                <label class="radio-container"><input type="radio" name="speaker" value="poor" /><span class="custom-radio"></span> Poor</label>
              </div>
            </div>

            <div class="field-group">
              <label class="form-label">Was the presentation clear and understandable?</label>
              <div class="radio-row">
                <label class="radio-container"><input type="radio" name="presentation" value="yes" required /><span class="custom-radio"></span> Yes</label>
                <label class="radio-container"><input type="radio" name="presentation" value="no" /><span class="custom-radio"></span> No</label>
              </div>
            </div>

            <!-- SECTION 4 -->
            <div class="section-title">Facilities</div>

            <div class="field-group">
              <label class="form-label">Venue arrangements:</label>
              <div class="radio-row flex-wrap">
                <label class="radio-container"><input type="radio" name="venue" value="excellent" required /><span class="custom-radio"></span> Excellent</label>
                <label class="radio-container"><input type="radio" name="venue" value="good" /><span class="custom-radio"></span> Good</label>
                <label class="radio-container"><input type="radio" name="venue" value="average" /><span class="custom-radio"></span> Average</label>
                <label class="radio-container"><input type="radio" name="venue" value="poor" /><span class="custom-radio"></span> Poor</label>
              </div>
            </div>

            <div class="field-group">
              <label class="form-label">Audio/visual quality:</label>
              <div class="radio-row flex-wrap">
                <label class="radio-container"><input type="radio" name="audio_visual" value="excellent" required /><span class="custom-radio"></span> Excellent</label>
                <label class="radio-container"><input type="radio" name="audio_visual" value="good" /><span class="custom-radio"></span> Good</label>
                <label class="radio-container"><input type="radio" name="audio_visual" value="average" /><span class="custom-radio"></span> Average</label>
                <label class="radio-container"><input type="radio" name="audio_visual" value="poor" /><span class="custom-radio"></span> Poor</label>
              </div>
            </div>

            <!-- SECTION 5 -->
            <div class="section-title">Overall Feedback</div>

            <div class="field-group">
              <label class="form-label">Overall rating of the program:</label>
              <div class="radio-row flex-wrap rating-stars">
                <label class="radio-container"><input type="radio" name="rating" value="5" required /><span class="custom-radio"></span> 5</label>
                <label class="radio-container"><input type="radio" name="rating" value="4" /><span class="custom-radio"></span> 4</label>
                <label class="radio-container"><input type="radio" name="rating" value="3" /><span class="custom-radio"></span> 3</label>
                <label class="radio-container"><input type="radio" name="rating" value="2" /><span class="custom-radio"></span> 2</label>
                <label class="radio-container"><input type="radio" name="rating" value="1" /><span class="custom-radio"></span> 1</label>
              </div>
            </div>

            <div class="field-group" style="margin-bottom: 0;">
              <label class="form-label" for="commentsInput">What did you like most about the program?</label>
              <textarea class="form-control" id="commentsInput" name="comments" placeholder="Tell us your thoughts..." rows="4"></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit" id="submitBtn">
              <span class="btn-text">Submit Feedback</span>
            </button>
          </form>
        </div>
      </div>
      
      <!-- Footer -->
      <footer class="form-footer mt-4 pb-4">
        Thank you for helping us improve!
      </footer>
    </section>

    <!-- Success Message Container -->
    <section id="page-success" class="page">
      <div class="thank-you-content">
        <div class="thank-you-check">
          <svg viewBox="0 0 52 52" class="checkmark">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
          </svg>
        </div>
        <h1 class="thank-you-title">Thank You!</h1>
        <p class="thank-you-subtitle">Your feedback has been recorded.</p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
